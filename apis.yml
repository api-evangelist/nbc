aid: nbc
name: NBC
description: >-
  NBC (National Broadcasting Company) is a major American commercial broadcast
  television network and a subsidiary of Comcast through NBCUniversal. NBC
  produces news (NBC News, Today), entertainment, late-night, and sports
  programming (Sunday Night Football, Olympic Games). NBC and parent company
  NBCUniversal do not publish a public developer portal. Programmatic
  advertising APIs (NBCUniversal One Platform) and streaming partner
  integrations (Peacock) are offered only through direct sales relationships
  rather than self-serve developer signup.
